<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Cargando...</title>
  <meta name="description" id="page-desc" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&family=Caveat:wght@500;700&family=Dancing+Script:wght@600;700&family=Great+Vibes&family=Pinyon+Script&family=Cinzel+Decorative:wght@700&family=Abril+Fatface&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>history.scrollRestoration='manual';if(location.hash)history.replaceState(null,'',location.pathname)</script>
</head>
<body>

  <!-- NAV -->
  <header class="nav">
    <div class="container nav__inner">
      <div class="nav__logo">
        <img id="nav-logo" src="" alt="Logo" />
        <span id="nav-nombre"></span>
      </div>
      <nav class="nav__links">
        <a href="#servicios">Lo que te ofrecemos!</a>
        <a href="#info">Horarios</a>
        <a href="#info">Contacto</a>
      </nav>
      <a href="#" id="nav-cta" class="btn btn--outline">Ingresar</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero__carousel" id="hero-carousel">
      <div class="hero__carousel-imgs" id="hero-carousel-imgs"></div>
      <div class="hero__carousel-dots" id="hero-carousel-dots"></div>
    </div>
    <div class="hero__callout">
      <p id="hero-callout"></p>
      <svg class="hero__callout-arrow--static" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 36" fill="none">
        <path d="M4 28 C20 26 45 12 62 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M62 6 L50 8 M62 6 L58 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <svg id="callout-arrow-svg" class="callout-arrow-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="container hero__content">
      <p class="hero__eyebrow">Bienvenid@s!</p>
      <h1 class="hero__title" id="hero-nombre"></h1>
      <p class="hero__sub" id="hero-slogan"></p>
      <p class="hero__desc" id="hero-desc"></p>
    </div>
  </section>

  <!-- SERVICIOS -->
  <section class="section" id="servicios">
    <div class="container">
      <h2 class="section__title section__title--manuscrita">Lo que te ofrecemos!</h2>
      <div class="grid-servicios" id="grid-servicios"></div>
      <div class="servicios-cta">
        <p>Para ver los talleres ofrecidos <a id="cursos-link" href="#" target="_blank" rel="noopener">entra acá</a></p>
        <a id="inscripcion-btn" href="#" target="_blank" rel="noopener" class="btn btn--primary">Para inscribirte en los talleres ingresá</a>
      </div>
    </div>
  </section>

  <!-- INFO: horarios + contacto -->
  <section class="section section--dark" id="info">
    <div class="container info-grid">

      <div class="info-block">
        <h2 class="section__title section__title--light">Horarios</h2>
        <ul class="horarios-list" id="horarios-list"></ul>
      </div>

      <div class="info-block">
        <h2 class="section__title section__title--light">Contacto</h2>
        <ul class="contacto-list" id="contacto-list"></ul>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer__inner">
      <span id="footer-nombre"></span>
      <span class="footer__sep">·</span>
      <a href="#" id="footer-ig" target="_blank" rel="noopener">Instagram</a>
      <span class="footer__sep">·</span>
      <a href="#" id="footer-cta">Reservar turno</a>
    </div>
  </footer>

  <a id="whatsapp-btn" class="whatsapp-btn" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="white" width="28" height="28"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.832.74 5.625 2.146 8.082L0 32l8.186-2.104A15.93 15.93 0 0 0 16 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 0 1-6.784-1.854l-.486-.29-5.04 1.295 1.34-4.902-.318-.504A13.267 13.267 0 0 1 2.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.27-9.878c-.398-.199-2.354-1.162-2.719-1.294-.365-.133-.63-.199-.896.199-.265.398-1.028 1.294-1.26 1.56-.232.265-.464.298-.862.1-.398-.2-1.681-.62-3.202-1.977-1.183-1.056-1.981-2.36-2.213-2.758-.232-.398-.025-.613.175-.811.18-.178.398-.464.597-.696.2-.232.265-.398.398-.663.133-.265.066-.497-.033-.696-.1-.199-.896-2.16-1.228-2.957-.323-.776-.651-.671-.896-.683l-.763-.013c-.265 0-.696.1-1.061.497-.365.398-1.394 1.362-1.394 3.322s1.427 3.854 1.626 4.119c.199.265 2.808 4.287 6.803 6.014.951.41 1.693.655 2.271.839.954.304 1.823.261 2.51.158.765-.114 2.354-.962 2.686-1.891.332-.93.332-1.727.232-1.891-.099-.166-.365-.265-.763-.464z"/></svg>
  </a>

  <script src="app.js"></script>
</body>
</html>
